[package]
name = "gemini-marketplace"
version = "0.1.0"
edition = "2021"

[lib]
name = "gemini_marketplace"
path = "src/lib.rs"

[[bin]]
name = "gemini-marketplace"
path = "src/bin/marketplace.rs"

[dependencies]
anyhow = "1.0"
directories = "5.0"
indicatif = "0.17"
reqwest = { version = "0.12", default-features = false, features = ["json", "gzip", "rustls-tls", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
tokio = { version = "1.41", features = ["full"] }
semver = "1.0"
url = "2.5"
humantime = "2.1"
humantime-serde = "1.1"
clap = { version = "4.5", features = ["derive"] }
axum = { version = "0.7", features = ["macros", "json"] }

[dev-dependencies]
assert_cmd = "2.0"
insta = { version = "1.39", features = ["yaml"] }
wiremock = "0.6"
