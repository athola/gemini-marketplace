openapi: 3.1.0
info:
  title: Gemini CLI Marketplace Local API
  version: 0.1.0
  description: >
    Internal service surface backing the `gemini marketplace` command suite.
    All operations are executed locally by the extension and exposed over an
    in-process boundary to enable reusable command handlers and JSON output parity.
servers:
  - url: http://localhost/marketplace
    description: Logical server used by CLI handlers (not network exposed)
tags:
  - name: Extensions
  - name: Sources
  - name: Cache
paths:
  /extensions:
    get:
      tags: [Extensions]
      summary: List extensions across configured sources
      operationId: listExtensions
      parameters:
        - in: query
          name: source
          schema:
            type: string
          description: Filter results to a single marketplace source
        - in: query
          name: search
          schema:
            type: string
          description: Keyword applied to name and description
        - in: query
          name: category
          schema:
            type: string
          description: Category or tag filter (case-insensitive)
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated extension summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionListResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /extensions/{id}:
    get:
      tags: [Extensions]
      summary: Retrieve full details for a specific extension
      operationId: getExtension
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Namespaced identifier (`source/extension`)
      responses:
        "200":
          description: Extension detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionDetail"
        "404":
          $ref: "#/components/responses/NotFound"
  /sources:
    get:
      tags: [Sources]
      summary: List configured marketplace sources
      operationId: listSources
      responses:
        "200":
          description: Configured sources with sync status
          content:
            application/json:
              schema:
                type: object
                properties:
                  sources:
                    type: array
                    items:
                      $ref: "#/components/schemas/MarketplaceSource"
  /sources/add:
    post:
      tags: [Sources]
      summary: Add a new marketplace source
      operationId: addSource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSourceRequest"
      responses:
        "201":
          description: Source added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceSource"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
  /sources/{name}:
    delete:
      tags: [Sources]
      summary: Remove a configured marketplace source
      operationId: deleteSource
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Source removed
        "404":
          $ref: "#/components/responses/NotFound"
  /cache/refresh:
    post:
      tags: [Cache]
      summary: Trigger a manual refresh of cached marketplace data
      operationId: refreshCache
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                  description: Optional source to refresh; defaults to all
                force:
                  type: boolean
                  description: Ignore TTL and queue immediate refresh
      responses:
        "202":
          description: Refresh queued or started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshStatus"
        "409":
          $ref: "#/components/responses/Conflict"
  /cache/ttl:
    patch:
      tags: [Cache]
      summary: Update cache TTL configuration
      operationId: updateCacheTtl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hours]
              properties:
                hours:
                  type: number
                  minimum: 1
                  description: New TTL horizon in hours
      responses:
        "200":
          description: TTL updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  hours:
                    type: number
                  effective_at:
                    type: string
                    format: date-time
        "400":
          $ref: "#/components/responses/ValidationError"

components:
  schemas:
    ExtensionSummary:
      type: object
      required:
        - id
        - name
        - description
        - repository_url
        - version
        - author
        - source
        - install_status
        - last_seen
      properties:
        id:
          type: string
          example: curated/awesome-extension
        name:
          type: string
        description:
          type: string
        repository_url:
          type: string
          format: uri
        version:
          type: string
        author:
          type: string
        source:
          type: string
        categories:
          type: array
          items:
            type: string
        install_status:
          type: string
          enum: [installed, not_installed, unknown]
        last_seen:
          type: string
          format: date-time
    ExtensionDetail:
      allOf:
        - $ref: "#/components/schemas/ExtensionSummary"
        - type: object
          required:
            - validation_summary
            - manifest_path
          properties:
            compatibility:
              type: array
              items:
                type: string
            readme_excerpt:
              type: string
            validation_summary:
              $ref: "#/components/schemas/ValidationSummary"
            manifest_path:
              type: string
    ValidationSummary:
      type: object
      required:
        - schema_status
        - semantic_status
        - last_checked
      properties:
        schema_status:
          type: string
          enum: [passed, warning, failed]
        semantic_status:
          type: string
          enum: [pending, passed, failed]
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"
        last_checked:
          type: string
          format: date-time
    ValidationError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: invalid_semver
        message:
          type: string
        path:
          type: string
          example: $.version
    MarketplaceSource:
      type: object
      required:
        - name
        - url
        - type
        - enabled
        - added_at
        - recursion_depth
        - sync_state
      properties:
        name:
          type: string
        url:
          type: string
        type:
          type: string
          enum: [github_repo, git, local_path]
        enabled:
          type: boolean
        added_at:
          type: string
          format: date-time
        last_synced_at:
          type: string
          format: date-time
          nullable: true
        recursion_depth:
          type: integer
          minimum: 1
          default: 5
        sync_state:
          type: string
          enum: [idle, fetching, queued_retry, rate_limited]
        etag:
          type: string
          nullable: true
    AddSourceRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
        name:
          type: string
          description: Optional explicit name; defaults to slug from URL
        recursion_depth:
          type: integer
          minimum: 1
          maximum: 15
    ExtensionListResponse:
      type: object
      required:
        - page
        - page_size
        - total
        - extensions
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
        extensions:
          type: array
          items:
            $ref: "#/components/schemas/ExtensionSummary"
        rate_limit:
          $ref: "#/components/schemas/RateLimitStatus"
        cache:
          $ref: "#/components/schemas/CacheMetadata"
    RefreshStatus:
      type: object
      required:
        - state
      properties:
        state:
          type: string
          enum: [queued, running, completed]
        source:
          type: string
          nullable: true
        next_eta:
          type: string
          format: date-time
          nullable: true
    RateLimitStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [ok, rate_limited]
        resets_at:
          type: string
          format: date-time
          nullable: true
        remaining:
          type: integer
          nullable: true
    CacheMetadata:
      type: object
      properties:
        refreshed_at:
          type: string
          format: date-time
        ttl_hours:
          type: number
        stale:
          type: boolean
    ProblemDetail:
      type: object
      required:
        - title
        - status
      properties:
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    Conflict:
      description: Operation conflicts with current state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    ValidationError:
      description: Input validation failure
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/ProblemDetail"
              - type: object
                properties:
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ValidationError"
    ServiceUnavailable:
      description: Marketplace unavailable; cached data should be used
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
