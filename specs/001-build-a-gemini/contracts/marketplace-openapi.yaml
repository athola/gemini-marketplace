openapi: 3.1.0
info:
  title: Gemini Marketplace CLI Local API
  version: 0.1.0
  description: >
    Local HTTP API exposed by the Gemini Marketplace CLI extension. Commands consume
    these endpoints to support dual-format output, background refresh, and observability.
servers:
  - url: http://127.0.0.1:{port}
    description: Local Axum server spun up by the CLI
paths:
  /marketplace/extensions:
    get:
      summary: List extensions across enabled sources
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: prefetch
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Paginated list of extensions with cache metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionListResponse'
        '503':
          description: No sources available or cache unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /marketplace/extensions/{extensionId}:
    get:
      summary: Retrieve detailed information for a specific extension
      parameters:
        - $ref: '#/components/parameters/ExtensionId'
      responses:
        '200':
          description: Detailed manifest view including validation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionDetailResponse'
        '404':
          description: Extension not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Manifest failed semantic validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /marketplace/sources:
    get:
      summary: List configured marketplace sources and their status
      responses:
        '200':
          description: Collection of sources with sync metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceListResponse'
    post:
      summary: Add a new marketplace source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSourceRequest'
      responses:
        '201':
          description: Source added and queued for sync
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceResponse'
        '409':
          description: Source slug conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /marketplace/sources/{slug}:
    delete:
      summary: Remove an existing source
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Source removed
        '404':
          description: Source not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /marketplace/cache/refresh:
    post:
      summary: Queue cache refresh for one or more sources
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '202':
          description: Jobs queued for background processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
  /marketplace/cache/ttl:
    patch:
      summary: Update cache TTL preference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTtlRequest'
      responses:
        '200':
          description: Updated TTL value persisted in preferences
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferencesResponse'

components:
  parameters:
    ExtensionId:
      name: extensionId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9-]+/[a-z0-9-]+$'
  schemas:
    ExtensionListResponse:
      type: object
      required:
        - page
        - pageSize
        - total
        - results
        - cache
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/ExtensionSummary'
        cache:
          $ref: '#/components/schemas/CacheMetadata'
    ExtensionSummary:
      type: object
      required:
        - id
        - name
        - description
        - version
        - source
        - installed
        - categories
        - warningsPresent
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string
        source:
          type: string
        installed:
          type: boolean
        categories:
          type: array
          items:
            type: string
        warningsPresent:
          type: boolean
    CacheMetadata:
      type: object
      required:
        - refreshedAt
        - ttlHours
        - staleAfter
        - rateLimit
      properties:
        refreshedAt:
          type: string
          format: date-time
        ttlHours:
          type: integer
        staleAfter:
          type: string
          format: date-time
        rateLimit:
          $ref: '#/components/schemas/RateLimitInfo'
    RateLimitInfo:
      type: object
      properties:
        remaining:
          type: integer
        resetAt:
          type: string
          format: date-time
        countdownSeconds:
          type: integer
    ExtensionDetailResponse:
      type: object
      required:
        - extension
        - validation
        - readme
      properties:
        extension:
          $ref: '#/components/schemas/ExtensionSummary'
        validation:
          $ref: '#/components/schemas/ValidationReport'
        readme:
          type: string
          nullable: true
    ValidationReport:
      type: object
      required:
        - schema
        - semantic
      properties:
        schema:
          type: array
          items:
            $ref: '#/components/schemas/ValidationMessage'
        semantic:
          type: array
          items:
            $ref: '#/components/schemas/ValidationMessage'
    ValidationMessage:
      type: object
      properties:
        field:
          type: string
        severity:
          type: string
          enum: [warning, error]
        detail:
          type: string
    ValidationErrorResponse:
      type: object
      required:
        - message
        - validation
      properties:
        message:
          type: string
        validation:
          $ref: '#/components/schemas/ValidationReport'
    SourceListResponse:
      type: object
      required:
        - sources
      properties:
        sources:
          type: array
          items:
            $ref: '#/components/schemas/Source'
    SourceResponse:
      type: object
      required:
        - source
      properties:
        source:
          $ref: '#/components/schemas/Source'
    Source:
      type: object
      required:
        - slug
        - displayName
        - url
        - sourceType
        - enabled
        - requiresAuth
        - defaultRecursionDepth
        - lastSyncedAt
        - syncStatus
      properties:
        slug:
          type: string
        displayName:
          type: string
        url:
          type: string
          format: uri
        sourceType:
          type: string
          enum: [gitHubRepo, gitUrl, localPath]
        enabled:
          type: boolean
        requiresAuth:
          type: boolean
        defaultRecursionDepth:
          type: integer
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
        syncStatus:
          type: string
          enum: [idle, syncing, error]
        errorMessage:
          type: string
          nullable: true
    AddSourceRequest:
      type: object
      required:
        - slug
        - url
      properties:
        slug:
          type: string
        url:
          type: string
          format: uri
        displayName:
          type: string
        requiresAuth:
          type: boolean
          default: false
        recursionDepth:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
    RefreshRequest:
      type: object
      properties:
        sources:
          type: array
          items:
            type: string
        force:
          type: boolean
          default: false
    RefreshResponse:
      type: object
      required:
        - queuedJobs
      properties:
        queuedJobs:
          type: array
          items:
            $ref: '#/components/schemas/QueuedJob'
    QueuedJob:
      type: object
      required:
        - jobId
        - source
        - status
      properties:
        jobId:
          type: string
          format: uuid
        source:
          type: string
        status:
          type: string
          enum: [pending, deferredRateLimit]
        retryAfter:
          type: string
          format: date-time
          nullable: true
    UpdateTtlRequest:
      type: object
      required:
        - ttlHours
      properties:
        ttlHours:
          type: integer
          minimum: 1
          maximum: 168
    PreferencesResponse:
      type: object
      required:
        - cacheTtlHours
      properties:
        cacheTtlHours:
          type: integer
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
