openapi: 3.0.3
info:
  title: Gemini Marketplace Internal API
  version: 0.1.0
  description: >
    Local HTTP API used by the Gemini CLI marketplace extension to power interactive
    flows and future automation surfaces.
servers:
  - url: http://127.0.0.1:{port}
    description: Ephemeral localhost server launched by the CLI during command execution.
paths:
  /extensions:
    get:
      summary: List extensions from configured sources.
      operationId: listExtensions
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Optional keyword to filter results server-side before fetch.
        - name: category
          in: query
          schema:
            type: string
          description: Optional category tag filter.
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page index when pagination enabled.
        - name: per_page
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
          description: Number of entries per page.
        - name: include_stale
          in: query
          schema:
            type: boolean
            default: false
          description: Include cached entries that expired but are awaiting refresh.
      responses:
        "200":
          description: Paginated collection of extensions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionList"
        "429":
          description: Source refresh is deferred due to upstream rate limits.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitNotice"
  /extensions/{namespace}:
    get:
      summary: Retrieve detailed metadata for a single extension.
      operationId: getExtension
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
          description: Source-qualified extension identifier (e.g., source/extension).
      responses:
        "200":
          description: Extension details with semantic validation output.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionDetail"
        "404":
          description: Namespace not present in cache or failed manifest validation.
  /sources:
    get:
      summary: List configured marketplace sources with sync metadata.
      operationId: listSources
      responses:
        "200":
          description: Array of sources.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceSource"
    post:
      summary: Add or enable a marketplace source.
      operationId: addSource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSourceRequest"
      responses:
        "202":
          description: Source accepted and scheduled for initial sync.
        "400":
          description: Invalid source definition or duplicate name.
  /sources/{name}:
    delete:
      summary: Remove or disable a marketplace source.
      operationId: removeSource
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Source removed.
        "404":
          description: Source name not found.
  /cache/refresh:
    post:
      summary: Trigger cache refresh for one or all sources.
      operationId: refreshCache
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                sources:
                  type: array
                  items:
                    type: string
                  description: Optional list of source names; defaults to all enabled sources.
      responses:
        "202":
          description: Refresh jobs enqueued.
  /cache/ttl:
    patch:
      summary: Update default cache TTL settings.
      operationId: updateCacheTtl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTtlRequest"
      responses:
        "200":
          description: TTL updated and persisted.
        "400":
          description: TTL outside allowed bounds.
  /status:
    get:
      summary: Retrieve health and telemetry snapshot.
      operationId: getStatus
      responses:
        "200":
          description: Current operational status metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusReport"

components:
  schemas:
    ExtensionList:
      type: object
      properties:
        page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/ExtensionSummary"
    ExtensionSummary:
      type: object
      required:
        - namespace
        - name
        - version
        - source
        - categories
        - install_status
        - cache_freshness
      properties:
        namespace:
          type: string
        name:
          type: string
        version:
          type: string
        source:
          type: string
        categories:
          type: array
          items:
            type: string
        install_status:
          type: string
          enum: [Installed, NotInstalled, Unknown]
        cache_freshness:
          type: string
          description: ISO8601 timestamp or 'stale'
        warnings:
          type: array
          items:
            type: string
    ExtensionDetail:
      allOf:
        - $ref: "#/components/schemas/ExtensionSummary"
        - type: object
          properties:
            description:
              type: string
            repository_url:
              type: string
              format: uri
            compatibility:
              type: array
              items:
                type: string
            dependencies:
              type: array
              items:
                type: string
            validation:
              type: object
              properties:
                schema_valid:
                  type: boolean
                semantic_valid:
                  type: boolean
                errors:
                  type: array
                  items:
                    type: string
    MarketplaceSource:
      type: object
      required:
        - name
        - url
        - source_type
        - enabled
      properties:
        name:
          type: string
        url:
          type: string
        source_type:
          type: string
          enum: [GitHubRepo, GitUrl, LocalPath]
        recursion_limit:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
        enabled:
          type: boolean
        last_synced_at:
          type: string
          nullable: true
        error:
          type: string
          nullable: true
    AddSourceRequest:
      type: object
      required:
        - name
        - url
      properties:
        name:
          type: string
        url:
          type: string
        source_type:
          type: string
          enum: [GitHubRepo, GitUrl, LocalPath]
          default: GitHubRepo
        recursion_limit:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
    UpdateTtlRequest:
      type: object
      required:
        - default_ttl_hours
      properties:
        default_ttl_hours:
          type: integer
          minimum: 1
          maximum: 168
    StatusReport:
      type: object
      properties:
        cache_hits:
          type: integer
        cache_misses:
          type: integer
        refresh_queue_depth:
          type: integer
        rate_limit_wait_seconds:
          type: integer
        top_search_terms:
          type: array
          items:
            type: string
    RateLimitNotice:
      type: object
      properties:
        source:
          type: string
        reset_at:
          type: string
          format: date-time
        queued_jobs:
          type: integer
